name: CI

on:
  push:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Build tooling images
        run: make build-tooling-images

      - name: Lint
        run: make lint

  test-client-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Build tooling images
        run: make build-tooling-images

      - name: Test client-web
        run: make test-client-web

  test-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Build tooling images
        run: make build-tooling-images

      - name: Test AI
        run: make test-ai

  test-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Build tooling images
        run: make build-tooling-images

      - name: Test server
        run: make test-server
