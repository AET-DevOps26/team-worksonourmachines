name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build tooling images
        run: make build-tooling-images

      - name: Lint
        run: make lint

      - name: Test
        run: make test
