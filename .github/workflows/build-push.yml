name: Build and Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-worksonourmachines
  NAMESPACE: team-worksonourmachines
  RELEASE_NAME: tutormatch
  RANCHER_KUBE_CONTEXT: stud
  RANCHER_DIGEST_FILE: /tmp/rancher-image-digests.env
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish application images and record digests
        run: make -C infrastructure rancher-publish-images

      - name: Upload published image digests
        uses: actions/upload-artifact@v4
        with:
          name: rancher-image-digests
          path: ${{ env.RANCHER_DIGEST_FILE }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Download published image digests
        uses: actions/download-artifact@v4
        with:
          name: rancher-image-digests
          path: /tmp

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Rancher
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_DB_PASSWORD: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_CLIENT_WEB_SECRET: ${{ secrets.KEYCLOAK_CLIENT_WEB_SECRET }}
        run: make -C infrastructure rancher-prod-deploy

      - name: Deployment diagnostics
        if: failure()
        run: make -C infrastructure rancher-diagnostics
