name: Build and Push Images

on:
  push:
    branches:
      - main
      - feature/k8s-deployment
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-worksonourmachines

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ai image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/ai/docker/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ai:latest
            ${{ env.IMAGE_PREFIX }}/ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/client-web/docker/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client-web:latest
            ${{ env.IMAGE_PREFIX }}/client-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Unlock any stuck pending-upgrade/pending-install state from prior failed runs
          STATUS=$(helm status tutormatch --namespace team-worksonourmachines -o json 2>/dev/null | jq -r '.info.status' || echo "not-found")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" || "$STATUS" == "pending-rollback" ]]; then
            helm rollback tutormatch 0 --namespace team-worksonourmachines || true
          fi
          # One-time migration: clear rollingUpdate from postgres so we can switch to Recreate
          kubectl patch deployment postgres -n team-worksonourmachines \
            --type=merge \
            -p='{"spec":{"strategy":{"type":"Recreate","rollingUpdate":null}}}' \
            2>/dev/null || true
          helm upgrade --install tutormatch ./helm/tutormatch \
            --namespace team-worksonourmachines \
            --create-namespace \
            --set ai.image=${{ env.IMAGE_PREFIX }}/ai:${{ github.sha }} \
            --set clientWeb.image=${{ env.IMAGE_PREFIX }}/client-web:${{ github.sha }} \
            --set ai.llmApiKey="$LLM_API_KEY" \
            --cleanup-on-fail \
            --wait \
            --timeout 15m
