name: Build and Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-worksonourmachines
  NAMESPACE: team-worksonourmachines
  RELEASE_NAME: tutormatch
  RANCHER_KUBE_CONTEXT: stud
  RANCHER_DIGEST_FILE: /tmp/rancher-image-digests.env
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0 https://github.com/docker/login-action/releases/tag/v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0 https://github.com/docker/setup-buildx-action/releases/tag/v3.12.0

      - name: Publish application images and record digests
        run: make -C infrastructure rancher-publish-images

      - name: Upload published image digests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2 https://github.com/actions/upload-artifact/releases/tag/v4.6.2
        with:
          name: rancher-image-digests
          path: ${{ env.RANCHER_DIGEST_FILE }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 https://github.com/actions/checkout/releases/tag/v4.3.1
        with:
          persist-credentials: false

      - name: Download published image digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0 https://github.com/actions/download-artifact/releases/tag/v4.3.0
        with:
          name: rancher-image-digests
          path: /tmp

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1 https://github.com/azure/setup-helm/releases/tag/v4.3.1

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Rancher
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          AI_CLIENT_SECRET: ${{ secrets.AI_CLIENT_SECRET }}
          SERVER_STUDENT_SECRET: ${{ secrets.SERVER_STUDENT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_DB_PASSWORD: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_CLIENT_WEB_SECRET: ${{ secrets.KEYCLOAK_CLIENT_WEB_SECRET }}
        run: make -C infrastructure rancher-prod-deploy

      - name: Deploy observability stack to Rancher
        env:
          GRAFANA_SMTP_USER: ${{ secrets.GRAFANA_SMTP_USER }}
          GRAFANA_SMTP_PASSWORD: ${{ secrets.GRAFANA_SMTP_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: make -C infrastructure rancher-observability-install
