name: Build and Push Images

on:
  push:
    branches:
      - main
      - feature/k8s-deployment
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-worksonourmachines

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ai image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/ai/docker/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ai:latest
            ${{ env.IMAGE_PREFIX }}/ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/client-web/docker/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client-web:latest
            ${{ env.IMAGE_PREFIX }}/client-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
