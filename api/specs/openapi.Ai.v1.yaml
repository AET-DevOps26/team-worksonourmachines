openapi: 3.0.0
info:
  title: AI API
  version: v1
tags: []
paths:
  /v1/plan:
    post:
      operationId: generatePlan
      summary: Generate study plan
      description: Fetches the learning goal and student from the Student API, tutors from the Marketplace API, then calls the LLM to generate three study-plan suggestions (cheapest, within_budget, best_quality). Does not persist anything.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Ai.GeneratePlanResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shared.Ai.GeneratePlanRequest'
security:
  - KeycloakBearerAuth: []
components:
  schemas:
    Shared.Errors.ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    Shared.Ai.PlanTier:
      type: string
      enum:
        - cheapest
        - within_budget
        - best_quality
    Shared.Ai.PlanMilestone:
      type: object
      required:
        - title
        - dueDate
        - topicId
        - tutorId
        - estimatedCost
      properties:
        title:
          type: string
        dueDate:
          type: string
          format: date-time
        topicId:
          type: string
        tutorId:
          type: string
        estimatedCost:
          type: number
          format: float
    Shared.Ai.ProposedTutor:
      type: object
      required:
        - id
        - displayName
        - hourlyRate
      properties:
        id:
          type: string
        displayName:
          type: string
        hourlyRate:
          type: number
          format: float
    Shared.Ai.PlanSuggestion:
      type: object
      required:
        - tier
        - description
        - totalEstimatedCost
        - proposedTutors
        - milestones
      properties:
        tier:
          $ref: '#/components/schemas/Shared.Ai.PlanTier'
        description:
          type: string
        totalEstimatedCost:
          type: number
          format: float
        proposedTutors:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Ai.ProposedTutor'
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Ai.PlanMilestone'
    Shared.Ai.GeneratePlanRequest:
      type: object
      required:
        - learningGoalId
      properties:
        learningGoalId:
          type: string
    Shared.Ai.GeneratePlanResponse:
      type: object
      required:
        - learningGoalId
        - suggestions
      properties:
        learningGoalId:
          type: string
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Ai.PlanSuggestion'
  securitySchemes:
    KeycloakBearerAuth:
      type: http
      scheme: Bearer
      description: Keycloak access token issued to the BFF client
servers:
  - url: https://ai.example.local
    description: AI API
    variables: {}
