openapi: 3.0.0
info:
  title: Student API
  version: v1
tags: []
paths:
  /v1/students/me:
    get:
      operationId: getMyProfile
      summary: Get my student profile
      description: Returns the authenticated student's profile. New students receive an empty default profile.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.StudentProfile'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
    put:
      operationId: updateMyProfile
      summary: Update my student profile
      description: Creates or updates the authenticated student's display name, bio, languages, and study focus.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.StudentProfile'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shared.Student.StudentProfileInput'
  /v1/students/me/goals:
    get:
      operationId: listMyGoals
      summary: List my learning goals
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shared.Student.LearningGoal'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
    post:
      operationId: createGoal
      summary: Create a learning goal
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.LearningGoal'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shared.Student.LearningGoalInput'
  /v1/students/me/goals/{id}:
    get:
      operationId: getGoal
      summary: Get a learning goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.LearningGoal'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
    put:
      operationId: updateGoal
      summary: Update a learning goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.LearningGoal'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shared.Student.LearningGoalInput'
    delete:
      operationId: deleteGoal
      summary: Delete a learning goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
  /v1/students/me/goals/{id}/plan:
    post:
      operationId: generatePlan
      summary: Generate and persist a study plan for a learning goal
      description: Calls the AI service to generate a study plan and persists it. Replaces any existing plan for the goal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.GeneratedPlan'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
    get:
      operationId: getPlan
      summary: Get the persisted study plan for a learning goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Student.GeneratedPlan'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shared.Errors.ErrorBody'
security:
  - KeycloakAuth:
      - openid
      - basic
      - profile
      - email
      - roles
components:
  schemas:
    Shared.Errors.ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    Shared.Marketplace.Location:
      type: string
      enum:
        - online
        - garching
        - munich
        - weihenstephan
        - straubing
        - ottobrunn
    Shared.Student.GeneratedPlan:
      type: object
      required:
        - id
        - learningGoalId
        - createdAt
        - suggestions
      properties:
        id:
          type: string
        learningGoalId:
          type: string
        createdAt:
          type: string
          format: date-time
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Student.GeneratedPlanSuggestion'
    Shared.Student.GeneratedPlanMilestone:
      type: object
      required:
        - title
        - dueDate
        - topicId
        - tutorId
        - estimatedCost
      properties:
        title:
          type: string
        dueDate:
          type: string
          format: date-time
        topicId:
          type: string
        tutorId:
          type: string
        estimatedCost:
          type: integer
          format: int32
          minimum: 0
          description: Estimated cost in EUR (whole euros).
    Shared.Student.GeneratedPlanSuggestion:
      type: object
      required:
        - tier
        - description
        - totalEstimatedCost
        - proposedTutors
        - milestones
      properties:
        tier:
          $ref: '#/components/schemas/Shared.Student.PlanTier'
        description:
          type: string
        totalEstimatedCost:
          type: integer
          format: int32
          minimum: 0
          description: Total estimated cost in EUR (whole euros).
        proposedTutors:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Student.GeneratedPlanTutor'
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Student.GeneratedPlanMilestone'
    Shared.Student.GeneratedPlanTutor:
      type: object
      required:
        - id
        - displayName
        - hourlyRate
      properties:
        id:
          type: string
        displayName:
          type: string
        hourlyRate:
          type: integer
          format: int32
          minimum: 0
          description: Hourly rate in EUR (whole euros).
    Shared.Student.LearningGoal:
      type: object
      required:
        - id
        - moduleId
        - description
        - targetDate
        - selfAssessedLevel
        - locations
      properties:
        id:
          type: string
        moduleId:
          type: string
        description:
          type: string
        targetDate:
          type: string
          format: date-time
        selfAssessedLevel:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Self-assessed level from 1 (beginner) to 5 (expert).
        budgetEur:
          type: integer
          format: int32
          minimum: 0
          description: Budget in EUR (whole euros).
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Marketplace.Location'
    Shared.Student.LearningGoalInput:
      type: object
      required:
        - moduleId
        - description
        - targetDate
        - selfAssessedLevel
        - locations
      properties:
        moduleId:
          type: string
        description:
          type: string
        targetDate:
          type: string
          format: date-time
        selfAssessedLevel:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Self-assessed level from 1 (beginner) to 5 (expert).
        budgetEur:
          type: integer
          format: int32
          minimum: 0
          description: Budget in EUR (whole euros).
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Shared.Marketplace.Location'
      description: The template for omitting properties.
    Shared.Student.PlanTier:
      type: string
      enum:
        - cheapest
        - within_budget
        - best_quality
    Shared.Student.StudentProfile:
      type: object
      required:
        - displayName
        - bio
        - languages
      properties:
        displayName:
          type: string
        bio:
          type: string
        languages:
          type: array
          items:
            type: string
        studyFocus:
          allOf:
            - $ref: '#/components/schemas/Shared.StudyFocus.StudyFocus'
          description: Self-assessed strength in each study skill (1 = needs work, 5 = confident).
    Shared.Student.StudentProfileInput:
      type: object
      required:
        - displayName
        - bio
        - languages
      properties:
        displayName:
          type: string
        bio:
          type: string
        languages:
          type: array
          items:
            type: string
        studyFocus:
          allOf:
            - $ref: '#/components/schemas/Shared.StudyFocus.StudyFocus'
          description: Self-assessed strength in each study skill (1 = needs work, 5 = confident).
    Shared.StudyFocus.StudyFocus:
      type: object
      required:
        - memorization
        - formalReasoning
        - conceptualUnderstanding
        - problemSolving
      properties:
        memorization:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Recalling definitions, formulas, and terminology.
        formalReasoning:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Proofs, logic, derivations, and symbolic manipulation.
        conceptualUnderstanding:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Building mental models and understanding why concepts work.
        problemSolving:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Applying theory to exercises and exam-style problems.
      description: Ratings for study-skill dimensions on a 1 (low) to 5 (high) scale.
  securitySchemes:
    KeycloakAuth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.tutormatch.localhost/realms/tutormatch/protocol/openid-connect/auth
          tokenUrl: https://auth.tutormatch.localhost/realms/tutormatch/protocol/openid-connect/token
          refreshUrl: https://auth.tutormatch.localhost/realms/tutormatch/protocol/openid-connect/token
          scopes:
            openid: ''
            basic: ''
            profile: ''
            email: ''
            roles: ''
      description: Keycloak OAuth2 authorization code auth for user login
servers:
  - url: https://api.tutormatch.localhost
    description: Student API
    variables: {}
