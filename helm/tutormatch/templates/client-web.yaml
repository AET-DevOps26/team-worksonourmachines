apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-web
  template:
    metadata:
      labels:
        app: client-web
    spec:
      containers:
        - name: client-web
          image: {{ .Values.clientWeb.image }}
          imagePullPolicy: {{ .Values.clientWeb.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 3000
          env:
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
            - name: SERVER_COMMUNICATION_API_URL
              value: {{ .Values.clientWeb.serverCommunicationApiUrl | quote }}
            - name: SERVER_MARKETPLACE_API_URL
              value: {{ .Values.clientWeb.serverMarketplaceApiUrl | quote }}
            - name: SERVER_STUDENT_API_URL
              value: {{ .Values.clientWeb.serverStudentApiUrl | quote }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: client-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-web
                port:
                  number: 3000
