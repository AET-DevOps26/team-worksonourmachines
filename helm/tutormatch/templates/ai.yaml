kind: Deployment
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      initContainers:
        - name: pull-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -sf -X POST "${OLLAMA_BASE_URL}/api/pull" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"${OLLAMA_MODEL}\"}"
          env:
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ai.ollamaBaseUrl }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ai.ollamaModel }}
      containers:
        - name: ai
          image: {{ .Values.ai.image }}
          imagePullPolicy: {{ .Values.ai.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ai.ollamaBaseUrl }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ai.ollamaModel }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
