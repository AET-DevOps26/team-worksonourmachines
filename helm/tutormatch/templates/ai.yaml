apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          image: {{ .Values.ai.image }}
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ai.ollamaBaseUrl }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
