apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-web
  namespace: tutormatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-web
  template:
    metadata:
      labels:
        app: client-web
    spec:
      containers:
        - name: client-web
          image: ghcr.io/aet-devops26/team-worksonourmachines/client-web:latest
          ports:
            - containerPort: 5173
          env:
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
            - name: SERVER_COMMUNICATION_API_URL
              value: tbd
            - name: SERVER_MARKETPLACE_API_URL
              value: tbd
            - name: SERVER_STUDENT_API_URL
              value: tbd
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: client-web
  namespace: tutormatch
spec:
  selector:
    app: client-web
  ports:
    - port: 5173
      targetPort: 5173
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: client-web
  namespace: tutormatch
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: tutormatch.example.com  # replace with your actual domain or Rancher hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-web
                port:
                  number: 5173
