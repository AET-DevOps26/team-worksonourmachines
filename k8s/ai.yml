apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: tutormatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      # Pull the configured Ollama model before the AI container starts.
      # This ensures the model is available the moment the service accepts requests.
      initContainers:
        - name: pull-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -sf -X POST "${OLLAMA_BASE_URL}/api/pull" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"${OLLAMA_MODEL}\"}"
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: llama3.2
      containers:
        - name: ai
          image: ghcr.io/aet-devops26/team-worksonourmachines/ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: llama3.2
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: tutormatch
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
