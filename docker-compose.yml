name: tutormatch

services:
  gateway:
    image: caddy:2-alpine
    ports:
      - 80:80
      - 443:443
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-tutormatch.localhost}
    volumes:
      - ${GATEWAY_CADDYFILE:-./artifacts/gateway/Caddyfile.dev}:/etc/caddy/Caddyfile:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client-web
      - keycloak

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutormatch}
      POSTGRES_USER: ${POSTGRES_USER:-tutormatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutormatch}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./artifacts/postgres/init:/docker-entrypoint-initdb.d:Z
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_FEATURE_LOGIN: ${KEYCLOAK_LOGIN_FEATURE:-v1}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-https://auth.${APP_HOSTNAME:-tutormatch.localhost}}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-tutormatch.localhost}
      IMPORT_FILES_LOCATIONS: /config/*
      IMPORT_MANAGED: partial
      IMPORT_REMOTESTATE_ENABLED: "true"
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN:-admin}
    volumes:
      - ./artifacts/keycloak/import:/config:ro,Z
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  client-web:
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/client-web:/app:Z
      - client-web-node-modules:/app/node_modules
    environment:
      LOG_FORMAT: ${CLIENT_WEB_LOG_FORMAT:-json}
      LOG_LEVEL: ${CLIENT_WEB_LOG_LEVEL:-info}
      APP_BASE_URL: ${APP_BASE_URL:-https://${APP_HOSTNAME:-tutormatch.localhost}}
      KEYCLOAK_ISSUER_PUBLIC: ${KEYCLOAK_ISSUER_PUBLIC:-https://auth.${APP_HOSTNAME:-tutormatch.localhost}/realms/tutormatch}
      KEYCLOAK_ISSUER_INTERNAL: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/tutormatch}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-client-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-client-web-dev-secret}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-before-production}
      SERVER_COMMUNICATION_API_URL: tbd
      SERVER_MARKETPLACE_API_URL: tbd
      SERVER_STUDENT_API_URL: tbd
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully

  ai:
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/ai:/app:Z
    ports:
      - 8000:8000
    environment:
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      LLM_PROVIDER: ${LLM_PROVIDER:-lmstudio}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-local-model}
      LLM_API_KEY: ${LLM_API_KEY:-}

  # ----------------------------- tooling -----------------------------

  api-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: api/docker/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    environment:
      CI: "true"
    volumes:
      - ./:/workspace/:Z
      - pnpm-store:/pnpm/store

  client-web-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: tooling
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    environment:
      CI: "true"
    volumes:
      - ./artifacts/client-web:/workspace/artifacts/client-web:Z
      - ./.git:/workspace/.git:Z # git mounts necessary for biome
      - ./.gitignore:/workspace/.gitignore:Z
      - pnpm-store:/pnpm/store

  ai-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: tooling
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    volumes:
      - ./artifacts/ai:/workspace/artifacts/ai:Z
      - /workspace/artifacts/ai/.venv # prevent venv from overriding host venv

volumes:
  postgres_data:
  pnpm-store:
  client-web-node-modules:
  caddy_data:
  caddy_config:
