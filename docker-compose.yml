name: tutormatch

x-hardening: &hardening
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  gateway:
    <<: *hardening
    image: caddy:2-alpine
    cap_add:
      - NET_BIND_SERVICE
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-tutormatch.localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api-ui
      - keycloak
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - auth.${APP_HOSTNAME:-tutormatch.localhost}

  postgres:
    <<: *hardening
    image: postgres:17-alpine
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./artifacts/postgres/init:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    <<: *hardening
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    <<: *hardening
    image: redis:7-alpine
    cap_add:
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-config-cli:
    <<: *hardening
    image: adorsys/keycloak-config-cli:latest
    command:
      - "--import.var-substitution.enabled=true"
      - "--import.var-substitution.script-evaluation-enabled=true"
    environment:
      IMPORT_FILES_LOCATIONS: /config/tutormatch-realm.json
      IMPORT_MANAGED: partial
      IMPORT_REMOTESTATE_ENABLED: "true"
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      JAVA_OPTS: "-Duser.home=/tmp"
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ./artifacts/keycloak/import:/config:ro,Z
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  demo-seed:
    <<: *hardening
    image: python:3.12-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        pip install --no-cache-dir 'psycopg[binary]==3.2.9' >/dev/null
        python3 /demo-seed/seed_demo_data.py
    environment:
      DEMO_DATA_PATH: /demo-seed/demo-data.json
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: tutormatch
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      PGHOST: postgres
      STUDENT_DB: ${STUDENT_DB:-student}
      STUDENT_USER: ${STUDENT_DB_USER:-student}
      STUDENT_PASSWORD: ${STUDENT_DB_PASSWORD:-student}
      MARKETPLACE_DB: ${MARKETPLACE_DB:-marketplace}
      MARKETPLACE_USER: ${MARKETPLACE_DB_USER:-marketplace}
      MARKETPLACE_PASSWORD: ${MARKETPLACE_DB_PASSWORD:-marketplace}
      COMMUNICATION_DB: ${COMMUNICATION_DB:-communication}
      COMMUNICATION_USER: ${COMMUNICATION_DB_USER:-communication}
      COMMUNICATION_PASSWORD: ${COMMUNICATION_DB_PASSWORD:-communication}
    volumes:
      - ./artifacts/demo-seed:/demo-seed:ro,Z
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      server-student:
        condition: service_started
      server-marketplace:
        condition: service_started
      server-communication:
        condition: service_started
    restart: "no"

  client-web:
    <<: *hardening
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: dev
    volumes:
      - caddy_data:/caddy-data:ro
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-ui:
    <<: *hardening
    image: scalarapi/api-reference:latest
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/server/application.yaml
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /config/caddy
      - /data/caddy
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    volumes:
      - ./api/specs:/docs:ro,Z
      - ./artifacts/api-ui/scalar.config.json:/config/scalar.config.json:ro,Z
      - ./artifacts/api-ui/docker/entrypoint.sh:/config/entrypoint.sh:ro,Z
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    <<: *hardening
    image: ${AI_IMAGE:-tutormatch/ai:dev}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
