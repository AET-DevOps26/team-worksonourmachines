name: tutormatch

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutormatch}
      POSTGRES_USER: ${POSTGRES_USER:-tutormatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutormatch}
      KEYCLOAK_DB: ${KEYCLOAK_DB:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./artifacts/postgres/init:/docker-entrypoint-initdb.d:Z
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_FEATURE_LOGIN: ${KEYCLOAK_LOGIN_FEATURE:-v1}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8080}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./artifacts/keycloak/import:/opt/keycloak/data/import:ro,Z
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy

  client-web:
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/client-web:/app:Z
      - client-web-node-modules:/app/node_modules
    ports:
      - 5173:5173
    environment:
      LOG_FORMAT: ${CLIENT_WEB_LOG_FORMAT:-json}
      LOG_LEVEL: ${CLIENT_WEB_LOG_LEVEL:-info}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      KEYCLOAK_ISSUER_PUBLIC: ${KEYCLOAK_ISSUER_PUBLIC:-http://localhost:8080/realms/tutormatch}
      KEYCLOAK_ISSUER_INTERNAL: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/tutormatch}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-client-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-client-web-dev-secret}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-before-production}
      SERVER_COMMUNICATION_API_URL: tbd
      SERVER_MARKETPLACE_API_URL: tbd
      SERVER_STUDENT_API_URL: tbd
    depends_on:
      - keycloak

  ai:
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/ai:/app:Z
    ports:
      - 8000:8000
    environment:
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - 11434:11434

  # ----------------------------- tooling -----------------------------

  api-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: api/docker/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    environment:
      CI: "true"
    volumes:
      - ./api:/workspace/api:Z
      - pnpm-store:/pnpm/store

  client-web-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: tooling
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    environment:
      CI: "true"
    volumes:
      - ./artifacts/client-web:/workspace/artifacts/client-web:Z
      - ./.git:/workspace/.git:Z # git mounts necessary for biome
      - ./.gitignore:/workspace/.gitignore:Z
      - pnpm-store:/pnpm/store

  ai-tooling:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: tooling
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    userns_mode: keep-id
    volumes:
      - ./artifacts/ai:/workspace/artifacts/ai:Z
      - /workspace/artifacts/ai/.venv # prevent venv from overriding host venv

volumes:
  postgres_data:
  pnpm-store:
  client-web-node-modules:
  ollama_data:
