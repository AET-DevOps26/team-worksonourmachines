name: TUtorMatch

services:
  client-web:
    build:
      context: .
      dockerfile: docker/client-web.Dockerfile
      target: dev
    volumes:
      - ./artifacts/client-web:/app:Z
      - client_web_node_modules:/app/node_modules
    ports:
      - 5173:5173
    environment:
      LOG_FORMAT: ${CLIENT_WEB_LOG_FORMAT:json}
      LOG_LEVEL: ${CLIENT_WEB_LOG_LEVEL:info}
      SERVER_COMMUNICATION_API_URL: tbd
      SERVER_MARKETPLACE_API_URL: tbd
      SERVER_STUDENT_API_URL: tbd

  ai:
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
      target: dev
    volumes:
      - ./artifacts/ai:/app:Z
    ports:
      - 8000:8000
    environment:
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - 11434:11434

volumes:
  client_web_node_modules:
  ollama_data: