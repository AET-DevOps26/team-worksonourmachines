name: tutormatch

services:
  gateway:
    image: caddy:2-alpine
    ports:
      - 80:80
      - 443:443
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-tutormatch.localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client-web
      - keycloak
    networks:
      default:
        aliases:
          - auth.${APP_HOSTNAME:-tutormatch.localhost}

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./artifacts/postgres/init:/docker-entrypoint-initdb.d:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest
    command:
      - "--import.var-substitution.enabled=true"
      - "--import.var-substitution.script-evaluation-enabled=true"
    environment:
      IMPORT_FILES_LOCATIONS: /config/tutormatch-realm.json
      IMPORT_MANAGED: partial
      IMPORT_REMOTESTATE_ENABLED: "true"
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      JAVA_OPTS: "-Duser.home=/tmp"
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ./artifacts/keycloak/import:/config:ro,Z
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  client-web:
    image: ${CLIENT_WEB_IMAGE:-ghcr.io/aet-devops26/team-worksonourmachines/client-web:latest}
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  ai:
    image: ${AI_IMAGE:-ghcr.io/aet-devops26/team-worksonourmachines/ai:latest}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
