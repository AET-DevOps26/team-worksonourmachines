x-server-base: &server-base
  image: maven:3.9-eclipse-temurin-17
  working_dir: /app/server
  volumes:
    - ./artifacts/server:/app/server:Z
    - server-maven-repository:/root/.m2
    - caddy_data:/caddy-data:ro
  depends_on:
    postgres:
      condition: service_healthy
    keycloak-config-cli:
      condition: service_completed_successfully

services:
  gateway:
    environment:
      APP_HOSTNAME: tutormatch.localhost
    volumes:
      - ./artifacts/gateway/Caddyfile.dev:/etc/caddy/Caddyfile:ro,Z

  postgres:
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 127.0.0.1:5432:5432

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_FEATURE_LOGIN: v1
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: https://auth.tutormatch.localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

  keycloak-config-cli:
    environment:
      APP_HOSTNAME: tutormatch.localhost
      KEYCLOAK_DEV_CLI_ENABLED: ${KEYCLOAK_DEV_CLI_ENABLED:-false}
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_USER: admin

  api-ui:
    volumes:
      - ./artifacts/api-ui/scalar.dev.config.json:/config/scalar.config.json:ro,Z

  server-communication:
    <<: *server-base
    environment:
      PORT: "8083"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.tutormatch.localhost/realms/tutormatch}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
      REDIS_URL: redis://redis:6379
    command: ["mvn", "-pl", "communication", "-am", "spring-boot:run"]
    ports:
      - 127.0.0.1:8083:8083
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config-cli:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  server-marketplace:
    <<: *server-base
    environment:
      PORT: "8082"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.tutormatch.localhost/realms/tutormatch}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
    command: ["mvn", "-pl", "marketplace", "-am", "spring-boot:run"]
    ports:
      - 127.0.0.1:8082:8082

  server-student:
    <<: *server-base
    environment:
      PORT: "8081"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.tutormatch.localhost/realms/tutormatch}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/tutormatch/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: server-student
      KEYCLOAK_CLIENT_SECRET: server-student-dev-secret
      AI_SERVICE_URL: http://ai:8000
    command: ["mvn", "-pl", "student", "-am", "spring-boot:run"]
    ports:
      - 127.0.0.1:8081:8081

  client-web:
    image: tutormatch/client-web:dev
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/client-web:/app:Z
      - client-web-node-modules:/app/node_modules
      - client-web-react-router-cache:/app/.react-router
      - client-web-vite-cache:/app/.vite
    environment:
      CI: "true"
      LOG_FORMAT: json
      LOG_LEVEL: info
      APP_BASE_URL: https://tutormatch.localhost
      KEYCLOAK_ISSUER: https://auth.tutormatch.localhost/realms/tutormatch
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      KEYCLOAK_CLIENT_ID: client-web
      KEYCLOAK_CLIENT_SECRET: client-web-dev-secret
      REDIS_URL: redis://redis:6379
      SERVER_COMMUNICATION_API_URL: http://server-communication:8083
      SERVER_MARKETPLACE_API_URL: http://server-marketplace:8082
      SERVER_STUDENT_API_URL: http://server-student:8081
    depends_on:
      server-communication:
        condition: service_started
      server-marketplace:
        condition: service_started
      server-student:
        condition: service_started

  ollama:
    image: ollama/ollama
    profiles: [ollama]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "ollama serve & sleep 5 && ollama pull ${LLM_MODEL:-llama3.2:latest} && wait",
      ]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q ${LLM_MODEL:-llama3.2:latest}"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  ai:
    image: tutormatch/ai:dev
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/ai:/app:Z
    ports:
      - 127.0.0.1:8000:8000
    environment:
      LOG_LEVEL: INFO
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:latest}
      LLM_API_KEY: ${LLM_API_KEY:-not-required}
      STUDENT_API_URL: http://server-student:8081
      MARKETPLACE_API_URL: http://server-marketplace:8082
      KEYCLOAK_ISSUER: https://auth.tutormatch.localhost/realms/tutormatch
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/tutormatch/protocol/openid-connect/token
      AI_CLIENT_ID: server-ai
      AI_CLIENT_SECRET: server-ai-dev-secret
      EXPECTED_CALLER_CLIENT_ID: server-student
    depends_on:
      server-student:
        condition: service_started
      server-marketplace:
        condition: service_started

volumes:
  server-maven-repository:
  client-web-node-modules:
  client-web-react-router-cache:
  client-web-vite-cache:
  ollama_data:
