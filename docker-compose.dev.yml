services:
  gateway:
    environment:
      APP_HOSTNAME: tutormatch.localhost
    volumes:
      - ./artifacts/gateway/Caddyfile.dev:/etc/caddy/Caddyfile:ro,Z

  postgres:
    environment:
      POSTGRES_DB: tutormatch
      POSTGRES_USER: tutormatch
      POSTGRES_PASSWORD: tutormatch
      KEYCLOAK_DB: keycloak
      KEYCLOAK_DB_USER: keycloak
      KEYCLOAK_DB_PASSWORD: keycloak
    ports:
      - 127.0.0.1:5432:5432

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_FEATURE_LOGIN: v1
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: https://auth.tutormatch.localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

  keycloak-config-cli:
    environment:
      APP_HOSTNAME: tutormatch.localhost
      KEYCLOAK_DEV_CLI_ENABLED: ${KEYCLOAK_DEV_CLI_ENABLED:-false}
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_USER: admin

  server-mock:
    image: tutormatch/server-mock:dev
    build:
      context: .
      dockerfile: artifacts/server-mock/docker/Dockerfile
    volumes:
      - ./artifacts/server-mock:/app:Z
      - server-mock-node-modules:/app/node_modules
    environment:
      PORT: "3000"
      KEYCLOAK_ISSUER: ${KEYCLOAK_INTERNAL_ISSUER:-http://keycloak:8080/realms/tutormatch}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-server-marketplace-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-server-marketplace-admin-secret}
    depends_on:
      keycloak-config-cli:
        condition: service_completed_successfully

  client-web:
    image: tutormatch/client-web:dev
    build:
      context: .
      dockerfile: artifacts/client-web/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/client-web:/app:Z
      - client-web-node-modules:/app/node_modules
      - client-web-react-router-cache:/app/.react-router
      - client-web-vite-cache:/app/.vite
      - caddy_data:/caddy-data:ro
    environment:
      CI: "true"
      LOG_FORMAT: json
      LOG_LEVEL: info
      APP_BASE_URL: https://tutormatch.localhost
      KEYCLOAK_ISSUER: https://auth.tutormatch.localhost/realms/tutormatch
      NODE_EXTRA_CA_CERTS: /caddy-data/caddy/pki/authorities/local/root.crt
      KEYCLOAK_CLIENT_ID: client-web
      KEYCLOAK_CLIENT_SECRET: client-web-dev-secret
      REDIS_URL: redis://redis:6379
      SERVER_COMMUNICATION_API_URL: http://server-mock:3000
      SERVER_MARKETPLACE_API_URL: http://server-mock:3000
      SERVER_STUDENT_API_URL: http://server-mock:3000
    depends_on:
      server-mock:
        condition: service_started

  ollama:
    image: ollama/ollama
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "ollama serve & sleep 5 && ollama pull ${LLM_MODEL:-llama3.2:latest} && wait",
      ]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q ${LLM_MODEL:-llama3.2:latest}"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  ai:
    image: tutormatch/ai:dev
    build:
      context: .
      dockerfile: artifacts/ai/docker/Dockerfile
      target: dev
    volumes:
      - ./artifacts/ai:/app:Z
    ports:
      - 127.0.0.1:8000:8000
    environment:
      LOG_LEVEL: INFO
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-llama3.2:latest}
      LLM_API_KEY: ${LLM_API_KEY:-not-required}
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  server-mock-node-modules:
  client-web-node-modules:
  client-web-react-router-cache:
  client-web-vite-cache:
  ollama_data:
