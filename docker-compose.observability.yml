name: tutormatch

services:
  prometheus:
    image: prom/prometheus:v3.13.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - 127.0.0.1:9090:9090
    volumes:
      - ./artifacts/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - 127.0.0.1:3001:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./artifacts/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./artifacts/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./artifacts/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.7.0
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - 127.0.0.1:3100:3100

  alloy:
    image: grafana/alloy:v1.16.1
    user: root
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    volumes:
      - ./artifacts/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # kics-scan ignore-line Alloy needs the socket to scrape container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
