---
- name: Run TUtorMatch Docker Compose project
  hosts: all
  become: true
  vars:
    application_user: tutormatch
    application_group: tutormatch
    application_dir: /opt/tutormatch
    compose_base_file: docker-compose.yml
    compose_azure_file: docker-compose.azure.yml
    compose_observability_file: docker-compose.observability.yml
    repo_root: "{{ playbook_dir }}/../../.."
    image_prefix: ghcr.io/aet-devops26/team-worksonourmachines
    image_tag: ""
    app_hostname: "tutormatch.{{ (ansible_host | default(inventory_hostname)) ~ '.nip.io' }}"
    app_base_url: "https://{{ app_hostname }}"
    keycloak_hostname: "https://auth.{{ app_hostname }}"
    keycloak_issuer: "{{ keycloak_hostname }}/realms/tutormatch"
    postgres_db: tutormatch
    postgres_user: tutormatch
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default('', true) }}"
    keycloak_db: keycloak
    keycloak_db_user: keycloak
    keycloak_db_password: "{{ lookup('env', 'KEYCLOAK_DB_PASSWORD') | default('', true) }}"
    keycloak_admin: admin
    keycloak_admin_password: "{{ lookup('env', 'KEYCLOAK_ADMIN_PASSWORD') | default('', true) }}"
    keycloak_client_id: client-web
    keycloak_client_secret: "{{ lookup('env', 'KEYCLOAK_CLIENT_SECRET') | default('', true) }}"
    server_student_client_secret: "{{ lookup('env', 'SERVER_STUDENT_CLIENT_SECRET') | default('', true) }}"
    keycloak_server_marketplace_admin_secret: "{{ lookup('env', 'KEYCLOAK_SERVER_MARKETPLACE_ADMIN_SECRET') | default('', true) }}"
    ai_client_secret: "{{ lookup('env', 'AI_CLIENT_SECRET') | default('', true) }}"
    llm_provider: logos
    llm_base_url: https://logos.aet.cit.tum.de/v1
    llm_model: openai/gpt-oss-120b
    llm_api_key: "{{ lookup('env', 'LLM_API_KEY') | default('', true) }}"
    grafana_admin_user: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('', true) }}"
    grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('', true) }}"

  pre_tasks:
    - name: Validate required production secrets
      ansible.builtin.assert:
        that:
          - image_tag | length > 0
          - postgres_password | length > 0
          - keycloak_db_password | length > 0
          - keycloak_admin_password | length > 0
          - keycloak_client_secret | length > 0
          - server_student_client_secret | length > 0
          - keycloak_server_marketplace_admin_secret | length > 0
          - ai_client_secret | length > 0
          - llm_api_key | length > 0
          - grafana_admin_user | length > 0
          - grafana_admin_password | length > 0
        fail_msg: "Provide all required production secrets via environment variables."

  tasks:
    - name: Ensure application directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ application_dir }}"
        - "{{ application_dir }}/artifacts/gateway"
        - "{{ application_dir }}/artifacts/keycloak/import"
        - "{{ application_dir }}/artifacts/postgres/init"
        - "{{ application_dir }}/artifacts/demo-seed"
        - "{{ application_dir }}/artifacts/api-ui"
        - "{{ application_dir }}/artifacts/api-ui/docker"
        - "{{ application_dir }}/api/specs"
        - "{{ application_dir }}/artifacts/observability/alloy"
        - "{{ application_dir }}/artifacts/observability/grafana/provisioning/datasources"
        - "{{ application_dir }}/artifacts/observability/grafana/provisioning/dashboards"
        - "{{ application_dir }}/artifacts/observability/grafana/dashboards"

    - name: Copy base Docker Compose file
      ansible.builtin.copy:
        src: "{{ repo_root }}/docker-compose.yml"
        dest: "{{ application_dir }}/{{ compose_base_file }}"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Azure Docker Compose override
      ansible.builtin.copy:
        src: "{{ repo_root }}/docker-compose.azure.yml"
        dest: "{{ application_dir }}/{{ compose_azure_file }}"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy observability Docker Compose file
      ansible.builtin.copy:
        src: "{{ repo_root }}/docker-compose.observability.yml"
        dest: "{{ application_dir }}/{{ compose_observability_file }}"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy production Caddyfile
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/gateway/Caddyfile.prod"
        dest: "{{ application_dir }}/artifacts/gateway/Caddyfile.prod"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Keycloak realm import
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/keycloak/import/tutormatch-realm.json"
        dest: "{{ application_dir }}/artifacts/keycloak/import/tutormatch-realm.json"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Postgres initialization scripts
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/postgres/init/"
        dest: "{{ application_dir }}/artifacts/postgres/init/"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0755"

    - name: Copy demo seed scripts
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/demo-seed/"
        dest: "{{ application_dir }}/artifacts/demo-seed/"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy API UI config
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/api-ui/scalar.config.json"
        dest: "{{ application_dir }}/artifacts/api-ui/scalar.config.json"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy API UI entrypoint
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/api-ui/docker/entrypoint.sh"
        dest: "{{ application_dir }}/artifacts/api-ui/docker/entrypoint.sh"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0755"

    - name: Copy API specs
      ansible.builtin.copy:
        src: "{{ repo_root }}/api/specs/"
        dest: "{{ application_dir }}/api/specs/"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Prometheus configuration
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/observability/prometheus.yml"
        dest: "{{ application_dir }}/artifacts/observability/prometheus.yml"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Alloy configuration
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/observability/alloy/config.alloy"
        dest: "{{ application_dir }}/artifacts/observability/alloy/config.alloy"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Grafana datasources provisioning
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/observability/grafana/provisioning/datasources/observability.yml"
        dest: "{{ application_dir }}/artifacts/observability/grafana/provisioning/datasources/observability.yml"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Grafana dashboards provisioning
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/observability/grafana/provisioning/dashboards/tutormatch.yml"
        dest: "{{ application_dir }}/artifacts/observability/grafana/provisioning/dashboards/tutormatch.yml"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Copy Grafana dashboards
      ansible.builtin.copy:
        src: "{{ repo_root }}/artifacts/observability/grafana/dashboards/"
        dest: "{{ application_dir }}/artifacts/observability/grafana/dashboards/"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0644"

    - name: Write deployment environment file
      ansible.builtin.copy:
        dest: "{{ application_dir }}/.env.azure"
        owner: "{{ application_user }}"
        group: "{{ application_group }}"
        mode: "0600"
        content: |
          APP_HOSTNAME={{ app_hostname }}
          APP_BASE_URL={{ app_base_url }}
          KEYCLOAK_HOSTNAME={{ keycloak_hostname }}
          KEYCLOAK_ISSUER={{ keycloak_issuer }}
          CLIENT_WEB_IMAGE={{ image_prefix }}/client-web:{{ image_tag }}
          AI_IMAGE={{ image_prefix }}/ai:{{ image_tag }}
          SERVER_COMMUNICATION_IMAGE={{ image_prefix }}/server-communication:{{ image_tag }}
          SERVER_MARKETPLACE_IMAGE={{ image_prefix }}/server-marketplace:{{ image_tag }}
          SERVER_STUDENT_IMAGE={{ image_prefix }}/server-student:{{ image_tag }}
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          KEYCLOAK_DB={{ keycloak_db }}
          KEYCLOAK_DB_USER={{ keycloak_db_user }}
          KEYCLOAK_DB_PASSWORD={{ keycloak_db_password }}
          KEYCLOAK_ADMIN={{ keycloak_admin }}
          KEYCLOAK_ADMIN_PASSWORD={{ keycloak_admin_password }}
          KEYCLOAK_CLIENT_ID={{ keycloak_client_id }}
          KEYCLOAK_CLIENT_SECRET={{ keycloak_client_secret }}
          SERVER_STUDENT_CLIENT_SECRET={{ server_student_client_secret }}
          KEYCLOAK_SERVER_MARKETPLACE_ADMIN_SECRET={{ keycloak_server_marketplace_admin_secret }}
          AI_CLIENT_SECRET={{ ai_client_secret }}
          LLM_PROVIDER={{ llm_provider }}
          LLM_BASE_URL={{ llm_base_url }}
          LLM_MODEL={{ llm_model }}
          LLM_API_KEY={{ llm_api_key }}
          GRAFANA_ADMIN_USER={{ grafana_admin_user }}
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
      no_log: true

    - name: Pull deployment images
      ansible.builtin.command: runuser --user "{{ application_user }}" -- docker compose --env-file .env.azure -f {{ compose_base_file }} -f {{ compose_azure_file }} -f {{ compose_observability_file }} pull
      args:
        chdir: "{{ application_dir }}"
      changed_when: true

    - name: Start Docker Compose project
      ansible.builtin.command: runuser --user "{{ application_user }}" -- docker compose --env-file .env.azure -f {{ compose_base_file }} -f {{ compose_azure_file }} -f {{ compose_observability_file }} up -d --remove-orphans
      args:
        chdir: "{{ application_dir }}"
      changed_when: true
