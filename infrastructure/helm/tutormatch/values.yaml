namespace: team-worksonourmachines

global:
  imageRegistry: ghcr.io/aet-devops26/team-worksonourmachines
  # Required for production deployments; GitHub Actions sets this to github.sha.
  imageTag: ""

ingress:
  host: team-worksonourmachines.stud.k8s.aet.cit.tum.de

ai:
  llmProvider: logos
  llmBaseUrl: https://logos.aet.cit.tum.de
  llmModel: openai/gpt-oss-120b
  llmApiKey: ""  # Set via the LLM_API_KEY GitHub Actions secret

clientWeb:
  serverCommunicationApiUrl: http://server-communication:8083
  serverMarketplaceApiUrl: http://server-marketplace:8082
  serverStudentApiUrl: http://server-student:8081

serverCommunication:
  port: 8083

serverMarketplace:
  port: 8082

serverStudent:
  port: 8081

apiUi: {}

postgres:
  db: tutormatch
  user: tutormatch
  password: tutormatch  # Override in production
  keycloakDb: keycloak
  keycloakUser: keycloak
  keycloakPassword: keycloak  # Override in production
  storageSize: 1Gi

keycloak:
  adminUser: admin
  adminPassword: admin  # Override in production
  clientWebSecret: client-web-secret  # Override in production
