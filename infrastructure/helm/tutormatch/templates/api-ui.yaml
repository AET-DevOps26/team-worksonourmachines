apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-ui
  template:
    metadata:
      labels:
        app: api-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-ui
          image: {{ .Values.apiUi.image }}
          imagePullPolicy: {{ .Values.apiUi.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: caddy-config
              mountPath: /config/caddy
            - name: caddy-data
              mountPath: /data/caddy
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
        - name: caddy-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-ui
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: api-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ui
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.{{ .Values.ingress.host }}
      secretName: api-ui-tls
  rules:
    - host: api.{{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-ui
                port:
                  number: 8080
