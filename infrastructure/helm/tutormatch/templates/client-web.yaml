apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: client-web
  template:
    metadata:
      labels:
        app: client-web
    spec:
      {{- if .Values.ingress.hostAliasIP }}
      # Local k3d: nip.io resolves *.127.0.0.1.nip.io to 127.0.0.1, which is the pod
      # loopback — not the host. client-web fetches Keycloak OIDC discovery at startup,
      # so it must reach the ingress. hostAliases overrides DNS inside the pod to point
      # the ingress hostnames at the nginx-ingress ClusterIP instead.
      hostAliases:
        - ip: {{ .Values.ingress.hostAliasIP }}
          hostnames:
            - {{ .Values.ingress.host }}
            - auth.{{ .Values.ingress.host }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: client-web
          image: {{ include "tutormatch.image" (list . "client-web" .Values.clientWeb.imageDigest) | quote }}
          imagePullPolicy: {{ .Values.clientWeb.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: {{ .Values.clientWeb.port }}
          env:
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: info
            - name: APP_BASE_URL
              value: "https://{{ .Values.ingress.host }}"
            - name: KEYCLOAK_ISSUER
              value: "https://auth.{{ .Values.ingress.host }}/realms/tutormatch"
            - name: KEYCLOAK_CLIENT_ID
              value: client-web
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: KEYCLOAK_CLIENT_WEB_SECRET
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: SERVER_COMMUNICATION_API_URL
              value: {{ .Values.clientWeb.serverCommunicationApiUrl | quote }}
            - name: SERVER_MARKETPLACE_API_URL
              value: {{ .Values.clientWeb.serverMarketplaceApiUrl | quote }}
            - name: SERVER_STUDENT_API_URL
              value: {{ .Values.clientWeb.serverStudentApiUrl | quote }}
            {{- if .Values.clientWeb.tlsRejectUnauthorized | eq false }}
            # Local k3d: nginx serves HTTPS with a self-signed cert; Node.js rejects it
            # by default. Disable TLS verification for pod-internal OIDC discovery only.
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: client-web
  ports:
    - port: {{ .Values.clientWeb.port }}
      targetPort: {{ .Values.clientWeb.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: client-web
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: client-web-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /stomp
            pathType: Prefix
            backend:
              service:
                name: server-communication
                port:
                  number: {{ .Values.serverCommunication.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-web
                port:
                  number: {{ .Values.clientWeb.port }}
