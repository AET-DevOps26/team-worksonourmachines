apiVersion: v1
kind: Secret
metadata:
  name: ai-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.ai.llmApiKey | quote }}
  AI_CLIENT_SECRET: {{ .Values.ai.aiClientSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.db | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  KEYCLOAK_DB: {{ .Values.postgres.keycloakDb | quote }}
  KEYCLOAK_DB_USER: {{ .Values.postgres.keycloakUser | quote }}
  KEYCLOAK_DB_PASSWORD: {{ .Values.postgres.keycloakPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: {{ .Values.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  KEYCLOAK_CLIENT_WEB_SECRET: {{ .Values.keycloak.clientWebSecret | quote }}
  KEYCLOAK_SERVER_STUDENT_SECRET: {{ .Values.keycloak.serverStudentSecret | quote }}
