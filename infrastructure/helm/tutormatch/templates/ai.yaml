apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          image: {{ include "tutormatch.image" (list . "ai" .Values.ai.imageDigest) | quote }}
          imagePullPolicy: {{ .Values.ai.imagePullPolicy | default "Always" }}
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: LLM_PROVIDER
              value: {{ .Values.ai.llmProvider | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.ai.llmBaseUrl | quote }}
            - name: LLM_MODEL
              value: {{ .Values.ai.llmModel | quote }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: LLM_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
