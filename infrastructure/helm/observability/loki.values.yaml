fullnameOverride: loki
deploymentMode: SingleBinary
rbac:
  pspEnabled: false
  sccEnabled: false
  namespaced: true
serviceAccount:
  create: true
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 75m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: false
sidecar:
  rules:
    enabled: false

ruler:
  enabled: false

minio:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
