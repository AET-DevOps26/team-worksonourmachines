spring:
  application:
    name: server-marketplace
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:https://auth.tutormatch.localhost/realms/tutormatch}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
  datasource:
    url: ${MARKETPLACE_DB_URL:jdbc:postgresql://postgres:5432/marketplace}
    username: ${MARKETPLACE_DB_USER:marketplace}
    password: ${MARKETPLACE_DB_PASSWORD:marketplace}
    driver-class-name: org.postgresql.Driver
  flyway:
    create-schemas: true
    default-schema: marketplace
    schemas: marketplace
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: marketplace

keycloak:
  admin:
    base-url: ${KEYCLOAK_BASE_URL:http://keycloak:8080}
    realm: ${KEYCLOAK_REALM:tutormatch}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:server-marketplace-admin}
    client-secret: ${KEYCLOAK_SERVER_MARKETPLACE_ADMIN_SECRET:server-marketplace-admin-secret}

server:
  port: ${PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
