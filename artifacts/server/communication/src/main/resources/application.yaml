spring:
  application:
    name: server-communication
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:https://auth.tutormatch.localhost/realms/tutormatch}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
  datasource:
    url: ${COMMUNICATION_DB_URL:jdbc:postgresql://postgres:5432/communication}
    username: ${COMMUNICATION_DB_USER:communication}
    password: ${COMMUNICATION_DB_PASSWORD:communication}
  flyway:
    create-schemas: true
    default-schema: communication
    schemas: communication
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: communication
  data:
    redis:
      url: ${REDIS_URL:redis://redis:6379}

keycloak:
  admin:
    base-url: ${KEYCLOAK_BASE_URL:http://keycloak:8080}
    realm: ${KEYCLOAK_REALM:tutormatch}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

server:
  port: ${PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
