spring:
  application:
    name: server-student
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:https://auth.tutormatch.localhost/realms/tutormatch}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/tutormatch/protocol/openid-connect/certs}
  datasource:
    url: ${STUDENT_DB_URL:jdbc:postgresql://postgres:5432/student}
    username: ${STUDENT_DB_USER:student}
    password: ${STUDENT_DB_PASSWORD:student}
  flyway:
    create-schemas: true
    default-schema: student
    schemas: student
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: student

server:
  port: ${PORT:8081}

ai:
  service-url: ${AI_SERVICE_URL:http://ai:8000}

keycloak:
  token-url: ${KEYCLOAK_TOKEN_URL:http://keycloak:8080/realms/tutormatch/protocol/openid-connect/token}
  client-id: ${KEYCLOAK_CLIENT_ID:server-student}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:server-student-dev-secret}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
