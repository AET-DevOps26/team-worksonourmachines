openapi: 3.0.0
info:
  title: Student API
  version: v1
servers:
- description: Student API
  url: https://student.example.local
security:
- KeycloakBearerAuth: []
paths:
  /v1/students/me:
    get:
      description: Returns the authenticated student's profile. New students receive
        an empty default profile.
      operationId: getMyProfile
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shared.Student.StudentProfile"
          description: The request has succeeded.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shared.Errors.ErrorBody"
          description: Access is unauthorized.
      summary: Get my student profile
      x-accepts:
      - application/json
    put:
      description: "Creates or updates the authenticated student's display name, bio,\
        \ languages, and study focus."
      operationId: updateMyProfile
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Shared.Student.StudentProfileInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shared.Student.StudentProfile"
          description: The request has succeeded.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shared.Errors.ErrorBody"
          description: The server could not understand the request due to invalid
            syntax.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shared.Errors.ErrorBody"
          description: Access is unauthorized.
      summary: Update my student profile
      x-content-type: application/json
      x-accepts:
      - application/json
components:
  schemas:
    Shared.Errors.ErrorBody:
      example:
        code: code
        message: message
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
    Shared.Student.StudentProfile:
      example:
        languages:
        - languages
        - languages
        displayName: displayName
        bio: bio
        studyFocus: ""
      properties:
        displayName:
          type: string
        bio:
          type: string
        languages:
          items:
            type: string
          type: array
        studyFocus:
          allOf:
          - $ref: "#/components/schemas/Shared.StudyFocus.StudyFocus"
          description: "Self-assessed strength in each study skill (1 = needs work,\
            \ 5 = confident)."
      required:
      - bio
      - displayName
      - languages
      type: object
    Shared.Student.StudentProfileInput:
      properties:
        displayName:
          type: string
        bio:
          type: string
        languages:
          items:
            type: string
          type: array
        studyFocus:
          allOf:
          - $ref: "#/components/schemas/Shared.StudyFocus.StudyFocus"
          description: "Self-assessed strength in each study skill (1 = needs work,\
            \ 5 = confident)."
      required:
      - bio
      - displayName
      - languages
      type: object
    Shared.StudyFocus.StudyFocus:
      description: Ratings for study-skill dimensions on a 1 (low) to 5 (high) scale.
      properties:
        memorization:
          description: "Recalling definitions, formulas, and terminology."
          format: int32
          maximum: 5
          minimum: 1
          type: integer
        formalReasoning:
          description: "Proofs, logic, derivations, and symbolic manipulation."
          format: int32
          maximum: 5
          minimum: 1
          type: integer
        conceptualUnderstanding:
          description: Building mental models and understanding why concepts work.
          format: int32
          maximum: 5
          minimum: 1
          type: integer
        problemSolving:
          description: Applying theory to exercises and exam-style problems.
          format: int32
          maximum: 5
          minimum: 1
          type: integer
      required:
      - conceptualUnderstanding
      - formalReasoning
      - memorization
      - problemSolving
      type: object
  securitySchemes:
    KeycloakBearerAuth:
      description: Keycloak access token issued to the BFF client
      scheme: Bearer
      type: http
