---
- name: Run TUtorMatch Docker Compose project
  hosts: all
  become: true
  vars:
    application_user: tutormatch
    application_dir: /opt/tutormatch

  tasks:
    - name: Check Docker Compose file exists on the VM
      ansible.builtin.stat:
        path: "{{ application_dir }}/docker-compose.yml"
      register: compose_file

    - name: Stop if the project has not been copied to the VM yet
      ansible.builtin.fail:
        msg: "No docker-compose.yml found under {{ application_dir }}. Copy or clone the project there first."
      when: not compose_file.stat.exists

    - name: Start Docker Compose project
      ansible.builtin.command: runuser --user "{{ application_user }}" -- docker compose up -d --build
      args:
        chdir: "{{ application_dir }}"
      changed_when: true
